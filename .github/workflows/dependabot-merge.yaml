# Caller for the org's reusable Dependabot auto-merge workflow. Dependabot opens
# weekly github-actions pin-bump PRs (see .github/dependabot.yaml); when a PR's CI
# finishes green the reusable workflow auto-approves the minor/patch ones and
# fast-forwards them into main, via the same signature-preserving "FF Merge" App as
# the `/merge` flow. Major updates are never approved, so they wait for a human.
#
# Both the approval and the merge use the App token, so approval works regardless
# of the org "Allow GitHub Actions to approve pull requests" setting (that only
# restricts GITHUB_TOKEN), and the fast-forward bypasses main's ruleset as the
# Integration bypass actor. The approval is what satisfies
# public-pull-request-required's required review.
#
# Just workflow_run — an event that adds no check run to the PR, so it leaves no
# skipped-job clutter (and needs no pull_request_target). The reusable workflow reads
# the minor/patch-vs-major policy from Dependabot's signed commit. `workflows:` lists
# this repo's only PR-gating check, CodeQL (public-code-quality); check_suite is not
# usable — GitHub does not fire it for a repo's own Actions CI.
#
# Org prerequisites (see bitwise-media-group/ff-merge): the FF_MERGE_CLIENT_ID
# variable + FF_MERGE_PRIVATE_KEY secret, and the "FF Merge" App in main's
# ruleset bypass list — the same App as the `/merge` flow.

name: Dependabot auto-merge

on:
  workflow_run:
    workflows: ["CodeQL analysis"]
    types: [completed]

# the App token does the privileged work; the caller grants nothing
permissions: {}

jobs:
  auto-merge:
    uses: bitwise-media-group/github-workflows/.github/workflows/dependabot-merge.yaml@ef97ca56a3a90f9f35556402e0c7478307edcbb9 # v3.0.0
    with:
      app-client-id: ${{ vars.FF_MERGE_CLIENT_ID }}
    secrets:
      app-private-key: ${{ secrets.FF_MERGE_PRIVATE_KEY }}
