# Caller for the org's reusable merge-notice workflow. When a PR is opened it
# posts a one-time comment explaining this repo merges via `/merge` (see
# merge.yaml), so contributors who don't yet know the convention aren't left
# waiting for a merge button that the ruleset reserves for the fast-forward flow.
#
# pull_request_target (not pull_request) so the notice also reaches fork PRs; the
# reusable workflow only posts a static comment with a pull-requests:write token
# and never checks out or runs PR code, so the elevated context is safe. No
# secret needed.

name: Merge Notice

on:
  pull_request_target:
    types: [opened]

# the reusable workflow comments with GITHUB_TOKEN; grant just that
permissions:
  pull-requests: write

jobs:
  notice:
    uses: bitwise-media-group/github-workflows/.github/workflows/merge-notice.yaml@4a154ffd7efbb6aff856386ec1def4b6dc364672 # v4.0.0
    with:
      pr-number: ${{ github.event.pull_request.number }}
